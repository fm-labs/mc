[project]
name = "kloudia"
version = "0.1.0"
description = "Kloudia AI-powered Cloud Orchestration Platform"
requires-python = ">=3.13"
dependencies = [
    "ansible>=11.5.0",
    "ansible-runner>=2.4.1",
    "bcrypt>=4.3.0",
    "celery>=5.5.1",
    "docker>=7.1.0",
    "fastapi>=0.115.12",
    "flower>=2.0.1",
    "jinja2>=3.1.6",
    "passlib>=1.7.4",
    "pydantic>=2.11.3",
    "pymongo>=4.12.0",
    "python-dotenv>=1.1.1",
    "python-jose>=3.5.0",
    "python-multipart>=0.0.20",
    "redis>=6.0.0",
    "requests>=2.32.5",
    "typer>=0.17.4",
    "uuid7>=0.1.0",
    "uvicorn>=0.34.2",
    "xscan",
]

[tool.uv.sources]
xscan = { path = "libs/xscan-1.3.1-py3-none-any.whl" }

[dependency-groups]
dev = [
    "celery-types>=0.23.0",
]
