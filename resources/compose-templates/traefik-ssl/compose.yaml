
services:


  traefik:
    image: traefik:v3.5.4
    # Enables the web UI and tells Traefik to listen to docker
    ports:
      - "80:80"
      - "443:443" # Expose port 443 for HTTPS
      # The Web UI (enabled by --api.insecure=true)
      - "8080:8080"
    volumes:
      # Needed for Traefik to see containers & labels
      #- /var/run/docker.sock:/var/run/docker.sock:ro
      # Persistent cert storage
      - traefik_letsencrypt:/letsencrypt
    labels:
      # Enable Traefik for this service, to make it available in the public network
      - traefik.enable=true
      # Use the traefik-ssl network (declared below)
      - traefik.docker.network=traefik-ssl


      # Route: HTTPS dashboard at https://${DASH_SUBDOMAIN}.${ROOT_DOMAIN}
      #- traefik.http.routers.traefik.rule=Host(`${DASH_SUBDOMAIN}.${ROOT_DOMAIN}`)
      #- traefik.http.routers.traefik.entrypoints=websecure
      #- traefik.http.routers.traefik.tls=true
      #- traefik.http.routers.traefik.tls.certresolver=le
      #- traefik.http.routers.traefik.service=api@internal

      # Security headers for the dashboard
      #- traefik.http.middlewares.secure-headers.headers.stsSeconds=63072000
      #- traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true
      #- traefik.http.middlewares.secure-headers.headers.stsPreload=true
      #- traefik.http.middlewares.secure-headers.headers.frameDeny=true
      #- traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true
      #- traefik.http.routers.traefik.middlewares=secure-headers@docker


      # Define the port inside of the Docker service to use
#      - traefik.http.services.traefik-dashboard.loadbalancer.server.port=8080
#      # Make Traefik use this domain (from an environment variable) in HTTP
#      - traefik.http.routers.traefik-dashboard-http.entrypoints=http
#      - traefik.http.routers.traefik-dashboard-http.rule=Host(`traefik.${DOMAIN?Variable not set}`)
#      # traefik-https the actual router using HTTPS
#      - traefik.http.routers.traefik-dashboard-https.entrypoints=https
#      - traefik.http.routers.traefik-dashboard-https.rule=Host(`traefik.${DOMAIN?Variable not set}`)
#      - traefik.http.routers.traefik-dashboard-https.tls=true
#      # Use the "le" (Let's Encrypt) resolver created below
#      - traefik.http.routers.traefik-dashboard-https.tls.certresolver=le
#      # Use the special Traefik service api@internal with the web UI/Dashboard
#      - traefik.http.routers.traefik-dashboard-https.service=api@internal

#      # https-redirect middleware to redirect HTTP to HTTPS
#      - traefik.http.middlewares.https-redirect.redirectscheme.scheme=https
#      - traefik.http.middlewares.https-redirect.redirectscheme.permanent=true

#      # traefik-http set up only to use the middleware to redirect to https
#      - traefik.http.routers.traefik-dashboard-http.middlewares=https-redirect
#      # admin-auth middleware with HTTP Basic auth
#      # Using the environment variables USERNAME and HASHED_PASSWORD
#      - traefik.http.middlewares.admin-auth.basicauth.users=${USERNAME?Variable not set}:${HASHED_PASSWORD?Variable not set}
#      # Enable HTTP Basic auth, using the middleware created above
#      - traefik.http.routers.traefik-dashboard-https.middlewares=admin-auth
    command:
      # Enable the Dashboard and API
      - --api
      - --api.dashboard=true
      - --api.insecure=true
      #- --entrypoints.dashboard.address=:8080

      # Read labels from Docker services
      # Only explicitly exposed services
      # Use socket-proxy to avoid permission issues
      - --providers.docker
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=tcp://socket-proxy:2375


      # --- Entrypoints ---
      # :80 remains for ACME HTTP-01 + redirect; everything else goes to :443
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.web.http.redirections.entryPoint.permanent=true
      - --entrypoints.websecure.address=:443

      # --- Let's Encrypt (HTTP-01 challenge on :80) ---
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web

      # --- Logging ---
      # Enable the access log, with HTTP requests
      - --accesslog=true
      - --accesslog.format=common
      # Enable the Traefik log, for configurations and errors
      - --log
      - --log.level=DEBUG
      - --log.format=common
      - --log.nocolor=true
    networks:
      - traefik-ssl


  #  whoami:
  #    image: traefik/whoami:latest
  #    restart: unless-stopped
  #    networks:
  #      - traefik-ssl
  #    labels:
  #      - traefik.enable=true
  #      - traefik.docker.network=traefik-ssl
  #      #- traefik.constraint-label=traefik-ssl
  #
  #      # Route: https://${APP1_DOMAIN}
  #      #- traefik.http.routers.whoami.rule=Host(`${WHOAMI_DOMAIN}`)
  #      #- traefik.http.routers.whoami.entrypoints=websecure
  #      #- traefik.http.routers.whoami.tls=true
  #      #- traefik.http.routers.whoami.tls.certresolver=le
  #
  #      # whoami listens on 80 inside the container
  #      - traefik.http.services.whoami.loadbalancer.server.port=80


  socket-proxy:
    image: tecnativa/docker-socket-proxy
    restart: always
    environment:
      CONTAINERS: "1"
      SERVICES: "1"
      LABELS: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "2375"
    #ports:
    #  - "2375:2375"
    networks:
      - traefik-ssl

networks:
  traefik-ssl:
    external: true

volumes:
  traefik_letsencrypt:
    name: traefik_letsencrypt