  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD:?VARIABLE-NOT-SET}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?VARIABLE-NOT-SET}
      #MYSQL_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wordpress-net

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    #    condition: service_healthy
    #ports:
    #  - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?VARIABLE-NOT-SET}
      WORDPRESS_DB_NAME: wordpress
      # Optional: set WP home/site URLs on first boot (adjust domain as needed)
      # WORDPRESS_CONFIG_EXTRA: |
      #   define('WP_HOME','http://localhost:8080');
      #   define('WP_SITEURL','http://localhost:8080');
    volumes:
      - wp_data:/var/www/html
      - ./dbcheck.php:/dbcheck.php:ro
    networks:
      - wordpress-net

