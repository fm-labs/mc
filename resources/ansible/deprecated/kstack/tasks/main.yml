---

- name: Create kstack directories
  file:
    path: "{{ item }}"
    state: directory
    mode: 0755
    owner: root
    group: root
  loop:
    - /var/lib/kstack


- name: Create admin user group
  group:
    name: stackadm
    state: present
    system: no
    gid: 1000
  when: kstack_create_admin_user == true


- name: Create admin user
  user:
    name: stackadm
    group: "stackadm"
    state: present
    shell: /bin/bash
    createhome: yes
    home: /var/lib/kstack/adm
    system: no
    groups: "docker"
    append: yes
    #password: "{{ admin.pass | password_hash('sha512') }}"
    #update_password: on_create
    uid: 1000
  when: kstack_create_admin_user == true


