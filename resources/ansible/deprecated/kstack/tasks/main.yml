- name: Pull kmc Docker image
  community.docker.docker_image:
    name: "{{ kmc_image_name }}"
    source: pull
    force_source: yes
    state: present
  when: kmc_default_installation == true


- name: Run kmc container
  community.docker.docker_container:
    name: "{{ kmc_container_name }}"
    image: "{{ kmc_image_name }}"
    state: started
    restart: true
    restart_policy: always
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
      - kmc_data:/app/data
    published_ports:
      - "3443:443"
  when: kmc_default_installation == true

