---


- name: Install required system packages
  apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: latest
    update_cache: true


- name: Add Docker GPG apt Key
  apt_key:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    state: present


- name: Add Docker APT repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_lsb.codename }} stable"
    state: present
    filename: "docker"


- name: Update apt and install docker-ce
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: latest
    update_cache: true


- name: Install docker compose plugin
  apt:
    name:
      - docker-compose-plugin
    state: latest
  when: docker_plugin_compose | bool


- name: Install docker model-runner plugin
  apt:
    name:
      - docker-model-plugin
    state: latest
  when: docker_plugin_model | bool

#    - name: Install Docker Module for Python
#      pip:
#        name: docker

- name: Start and enable Docker service
  systemd:
    name: docker
    state: started
    enabled: yes


- name: Verify Docker installation
  command: docker --version
  register: docker_version


- name: Display Docker version
  debug:
    var: docker_version.stdout


- name: Add users to docker group
  user:
    name: "{{ item }}"
    append: true
    groups: docker
  loop: "{{ docker_users }}"
  when: docker_users | length > 0