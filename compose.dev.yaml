
services:
  server:
    build:
      context: .
      dockerfile: Containerfile
    image: "mc:latest"
    ports:
      - "3080:3080" # Nginx
      #- "5000:5000" # API
      #- "5555:5555" # Flower
    networks:
      - mc-net
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${PWD}/data/local:/opt/mc
      #- ${SSH_AUTH_SOCK}:/ssh-agent:ro
      #- ${HOME}/.local/share/containers/podman/machine/podman.sock:/var/run/podman.sock:ro
    #environment:
      #- REDIS_HOST=redis
      #- REDIS_PORT=6379
      #- REDIS_DB=0
      #- MONGODB_URL=mongodb://admin:adminpassword@mongodb:27017?authSource=admin
      #- HOST_DATA_DIR=${PWD}/data
      #- FLOWER_USER_NAME=${FLOWER_USER_NAME:-admin}
      #- FLOWER_USER_PASS=${FLOWER_USER_PASS:-password}
      #- SSH_AUTH_SOCK=/ssh-agent
      #- SSH_CONFIG=/data/ssh_config
    #env_file:
    #  - ./.env.docker.local
    #depends_on:
      #- redis
      #- mongodb
    develop:
      watch:
        - action: sync+exec
          path: ./src
          target: /app/src
          ignore:
            - "__pycache__/"
            - "*.pyc"
            - "*.egg-info/"
            - "x*.py"
          exec:
            command: ["supervisorctl", "restart", "all"]
        - action: sync
          path: ./resources
          target: /app/resources
        - action: rebuild
          path: ./container
        - action: rebuild
          path: ./uv.lock
        #- action: rebuild
        #  path: ./ui
        - action: rebuild
          path: Containerfile
        - action: restart
          path: ./.env.docker.local


  node01:
    build:
      context: .
      dockerfile: Containerfile
    image: "mc:node01"
    ports:
      - "3081:3080"
    networks:
      - mc-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${PWD}/data/node01:/opt/mc
    environment:
      - MC_REMOTE_API_KEY=supersecretkey1
    profiles:
      - cluster

  node02:
    build:
      context: .
      dockerfile: Containerfile
    image: "mc:node02"
    ports:
      - "3082:3080"
    networks:
      - mc-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${PWD}/data/node02:/opt/mc
    environment:
      - MC_REMOTE_API_KEY=supersecretkey2
    profiles:
      - cluster


  redis:
    image: redis:latest
    ports:
      - "13379:6379"
    networks:
      - mc-net
    volumes:
      - redis-data:/data
    profiles:
      - advanced

  mongodb:
    image: mongo:latest
    ports:
      - "13017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=adminpassword
      - MONGO_INITDB_ROOT_AUTHENTICATION_DATABASE=admin
    networks:
      - mc-net
    volumes:
      - mongo-data:/data/db
    profiles:
      - advanced


volumes:
  redis-data:
    driver: local
  mongo-data:
    driver: local

networks:
  mc-net:
    driver: bridge
    name: mc-net
