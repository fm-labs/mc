
services:
  server:
    build:
      context: .
      dockerfile: Containerfile
    image: "mc:latest"
    ports:
      - "13080:3080" # Nginx
      - "13500:5000" # API
      #- "13555:5555" # Flower
    networks:
      - mc-net
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${PWD}/data/local:/opt/mc
      #- ${SSH_AUTH_SOCK}:/ssh-agent:ro
      #- ${HOME}/.local/share/containers/podman/machine/podman.sock:/var/run/podman.sock:ro
    #environment:
      #- REDIS_HOST=redis
      #- REDIS_PORT=6379
      #- REDIS_DB=0
      #- MONGODB_URL=mongodb://admin:adminpassword@mongodb:27017?authSource=admin
      #- HOST_DATA_DIR=${PWD}/data
      #- FLOWER_USER_NAME=${FLOWER_USER_NAME:-admin}
      #- FLOWER_USER_PASS=${FLOWER_USER_PASS:-password}
      #- SSH_AUTH_SOCK=/ssh-agent
      #- SSH_CONFIG=/data/ssh_config
    #env_file:
    #  - ./.env.docker.local
    #depends_on:
      #- redis
      #- mongodb
    develop:
      watch:
        - action: sync+exec
          path: ./src
          target: /app/src
          ignore:
            - "__pycache__/"
            - "*.pyc"
            - "*.egg-info/"
            - "x*.py"
          exec:
            command: ["supervisorctl", "restart", "all"]
        - action: sync
          path: ./resources
          target: /app/resources
        - action: rebuild
          path: ./container
        - action: rebuild
          path: ./uv.lock
        #- action: rebuild
        #  path: ./ui
        - action: rebuild
          path: Containerfile
        - action: restart
          path: ./.env.docker.local

