[metadata]
name = "kloudia"
version = "1.0.0"
description = "A sample web project deployment configuration"


[vars]
python_version = "3.11"
app_name = "kloudia"
app_entry = "app.py"
app_port = "8080"
image_name = "kloudia:latest"
dockerhub_repo = "yourusername/kloudia:latest"


[build]
[build.app]
what = "python-app"
command_before = "cp -f ../rx/dist/rx*.whl ./libs/ && uv sync --upgrade"
command = "uv build"

[build.wheel]
what = "python-wheel"
command = "uv build --wheel"

[build.binary]
what = "python-binary"
command = "./build_bin.sh"

[build.image]
what = "image"
command="docker build -t kloudia:latest ."


[publish]
[publish.image]
what = "image"
src="kloudia:latest"
dest="kloudia:${version}"

[publish.image-dockerhub]
what = "image"
src="kloudia:${version}"
dest="docker.io/yourusername/kloudia:latest"
#dest="dockerhub://yourusername/kloudia:latest"

[publish.container-local]
what = "container"
engine = "docker"
src="kloudia:latest"
dest="unix:///var/run/docker.sock"
command_before = "rx build image"

[publish.compose-local]
what = "compose"
dest="docker://"
compose_file = "docker-compose.local.yml"

[publish.compose-local-podman]
what = "compose"
dest="podman://"

[publish.compose-remote]
what = "compose"
dest="ssh://user@remotehost"

[publish.compose-ec2]
what = "compose"
dest="ec2://user@ec2-instance"

[publish.kubernetes]
what = "kubernetes"
dest="k8s://"


# RUN CONFIGS
[run]
[run.lint]
command = "uv lint"

[run.devserver]
command = "uvicorn --app-dir ./src server:app --reload"

[run.celery-worker-local]
command = "celery --workdir ./src -A celery_worker.celery worker --loglevel=INFO -E"

[run.celery-beat-local]
command = "celery --workdir ./src -A celery_worker.celery beat --loglevel=INFO"

[run.celery-flower-local]
command = "celery --workdir ./src -A celery_worker.celery flower --loglevel=INFO --port=5555"

[run.devstack-up]
command_before = "rx build app"
command = "docker-compose -f docker-compose.dev.yml --env-file .env.docker.local up --build --force-recreate --watch"

[run.devstack-down]
command = "docker-compose -f docker-compose.dev.yml --env-file .env.docker.local down"

[run.podstack-up]
command_before = "rx build app"
command = "podman compose -f docker-compose.dev.yml --env-file .env.docker.local up --build --force-recreate -d"

[run.podstack-down]
command = "podman compose -f docker-compose.dev.yml --env-file .env.docker.local down"

# PIPELINES
[pipelines]
local-deploy = ["build app", "build image", "publish compose-local", "publish compose-local-podman"]
full-deploy = ["build app", "publish image", "publish compose-local", "publish kubernetes"]
